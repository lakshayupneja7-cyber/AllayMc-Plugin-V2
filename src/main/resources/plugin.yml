name: AllayMc
version: 2.2.2
main: com.allaymc.exile.AllayMcPlugin
api-version: "1.21"
author: ElleIsOP
description: A plugin Special to AllayMc Minecraft Server
softdepend: [LuckPerms]

commands:
  exile:
    description: Check your exile status or another player's exile status
    usage: /exile [player]
    permission: allaymc.exile.self

  exileadd:
    description: Exile a player for a time
    usage: /exileadd <player> <time> <reason> <item:amount,item:amount>
    permission: allaymc.exile.add

  exilefree:
    description: Free a player from exile
    usage: /exilefree <player>
    permission: allaymc.exile.free

  exileextend:
    description: Extend exile time
    usage: /exileextend <player> <time>
    permission: allaymc.exile.extend

  exileremove:
    description: Permanently remove a player from the server
    usage: /exileremove <player>
    permission: allaymc.exile.remove

  exilecount:
    description: Check how many times a player was exiled
    usage: /exilecount <player>
    permission: allaymc.exile.count

  serverborder:
    description: Manage the custom global server border
    usage: /serverborder | /serverborder set <blocks> | /serverborder add <blocks> | /serverborder chunks
    permission: allaymc.serverborder.view

  caseadmin:
    description: Staff controls for cases
    usage: /caseadmin <info|fail|complete> <caseId>
    permission: allaymc.case.admin

  exilecase:
    description: Guided exile case creation
    usage: /exilecase create <player> | /exilecase cancel
    permission: allaymc.exile.add

  payoff:
    description: Open payoff menu or claim paid items
    usage: /payoff | /payoff claim <caseId>
    permission: allaymc.exile.self

permissions:
  allaymc.exile.self:
    default: true
  allaymc.exile.others:
    default: op
  allaymc.exile.add:
    default: op
  allaymc.exile.free:
    default: op
  allaymc.exile.extend:
    default: op
  allaymc.exile.remove:
    default: op
  allaymc.exile.count:
    default: op
  allaymc.serverborder.view:
    default: op
  allaymc.serverborder.set:
    default: op
  allaymc.serverborder.add:
    default: op
  allaymc.case.admin:
    default: op
  allaymc.payoff.claim:
    default: op
  allaymc.admin:
    default: op
    children:
      allaymc.exile.others: true
      allaymc.exile.add: true
      allaymc.exile.free: true
      allaymc.exile.extend: true
      allaymc.exile.remove: true
      allaymc.exile.count: true
      allaymc.serverborder.view: true
      allaymc.serverborder.set: true
      allaymc.serverborder.add: true
      allaymc.case.admin: true
      allaymc.payoff.claim: true
