settings:
  timer-check-seconds: 1
  border-check-seconds: 1
  save-on-quit: true
  restore-normal-location-on-free: true

borders:
  overworld:
    world: "world"
    center-x: 0.0
    center-z: 0.0
    main-size-blocks: 6400.0
    exile-threshold-blocks: 2000000.0
    exile-spawn-min: 2000000.0
    exile-spawn-max: 2300000.0
  nether:
    world: "world_nether"
    center-x: 0.0
    center-z: 0.0
    main-size-blocks: 800.0
    exile-threshold-blocks: 250000.0
    exile-spawn-min: 250000.0
    exile-spawn-max: 300000.0
  safe-teleport-tries: 100
  avoid-water: true
  avoid-lava: true
  avoid-leaves: true

danger-zone:
  enabled: true
  damage-per-hit: 8.0
  hit-interval-seconds: 1
  warning-message: "&cYou are in the forbidden zone between the server border and exile border!"
  warning-actionbar: "&4TURN BACK"
  pushback-strength: 1.55

barrier:
  enabled: true
  warn-every-ms: 1200
  particles: true
  sounds: true
  knockback: true
  hard-cancel: true
  main-message: "&cA mysterious force blocks you at the server border."
  exile-message-exiled: "&cThe exile border rejects your return."
  exile-message-normal: "&cThe exile lands reject you."

recovery:
  enabled: true
  auto-open-gui: true
  grace-seconds: 60
  fail-action: "ban"
  fail-ban-reason: "Failed exile recovery requirements"
  allow-partial-deposit: false
  strict-meta-match: false
  keep-player-in-exile-during-recovery: true
  gui-title: "&cExile Payoff"
  recovery-world: ""
  recovery-x: 0.0
  recovery-y: 80.0
  recovery-z: 0.0
  
return-location:
  use-config-return-if-normal-location-missing: true
  world: "world"
  x: 0.5
  y: 64.0
  z: 0.5
  yaw: 0.0
  pitch: 0.0

inventory:
  keep-separate-exile-inventory: true
  clear-player-on-exile: true
  restore-normal-on-free: true

punishments:
  exileremove:
    mode: "kick"
    kick-message: "&cYou have been permanently removed from the server."
    ban-reason: "Removed from server by exile punishment."
